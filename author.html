<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <base href="/Halomash-3d-models-catalog/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автор - HaloMesh</title>
    <link rel="icon" type="image/png" href="img/halo.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-top">
            <a href="index.html" class="site-logo">
                <img src="img/haloblack.png" class="icon-light" alt="HaloMesh">
                <img src="img/halo.png" class="icon-dark" alt="HaloMesh">
            </a>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link">
                    <img src="img/domicwhite.png" class="nav-icon icon-light" alt="Главная">
                    <img src="img/domicblack.png" class="nav-icon icon-dark" alt="Главная">
                    <span class="nav-label">Главная</span>
                </a>
                <a href="favorites.html" class="nav-link">
                    <img src="img/bookwhite.png" class="nav-icon icon-light" alt="Избранное">
                    <img src="img/bookblack.png" class="nav-icon icon-dark" alt="Избранное">
                    <span class="nav-label">Избранное</span>
                </a>
                <a href="authors.html" class="nav-link">
                    <img src="img/peoplewhite.png" class="nav-icon icon-light" alt="Авторы">
                    <img src="img/peopleblack.png" class="nav-icon icon-dark" alt="Авторы">
                    <span class="nav-label">Авторы</span>
                </a>
            </nav>
        </div>
        <div class="sidebar-bottom">
            <button id="theme-toggle" class="theme-btn">
                <img src="img/sun.png" class="theme-icon icon-light" alt="Светлая тема">
                <img src="img/sparkles.png" class="theme-icon icon-dark" alt="Тёмная тема">
            </button>
        </div>
    </aside>

    <header class="top-bar">
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Поиск моделей...">
        </div>
        <div class="user-menu">
            <button id="theme-toggle-mobile" class="theme-btn-mobile">
                <img src="img/sun.png" class="theme-icon icon-light" alt="Светлая тема">
                <img src="img/sparkles.png" class="theme-icon icon-dark" alt="Тёмная тема">
            </button>
            <button class="avatar-btn" id="avatar-toggle">
                <div class="avatar-circle">К</div>
            </button>
            <div class="dropdown-menu" id="user-dropdown">
                <div class="dropdown-header">
                    <div class="dropdown-avatar">К</div>
                </div>
                <div class="dropdown-divider"></div>
                <a href="calculator.html" class="dropdown-item">
                    <span>Калькулятор</span>
                </a>
                <a href="guide.html" class="dropdown-item">
                    <span>Помощь</span>
                </a>
                <button class="dropdown-item logout-btn" onclick="handleLogout()">
                    <span>Выход</span>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div id="author-page-content"></div>
    </main>
    
    <script src="js/main.js" defer></script>
</body>
</html>
