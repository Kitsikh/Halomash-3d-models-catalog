<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <base href="/Halomash-3d-models-catalog/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор - HaloMesh</title>
    <link rel="icon" type="image/png" href="img/halo.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-top">
            <a href="index.html" class="site-logo">
                <img src="img/haloblack.png" class="icon-light" alt="HaloMesh">
                <img src="img/halo.png" class="icon-dark" alt="HaloMesh">
            </a>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link">
                    <img src="img/domicwhite.png" class="nav-icon icon-light" alt="Главная">
                    <img src="img/domicblack.png" class="nav-icon icon-dark" alt="Главная">
                    <span class="nav-label">Главная</span>
                </a>
                <a href="favorites.html" class="nav-link">
                    <img src="img/bookwhite.png" class="nav-icon icon-light" alt="Избранное">
                    <img src="img/bookblack.png" class="nav-icon icon-dark" alt="Избранное">
                    <span class="nav-label">Избранное</span>
                </a>
                <a href="authors.html" class="nav-link">
                    <img src="img/peoplewhite.png" class="nav-icon icon-light" alt="Авторы">
                    <img src="img/peopleblack.png" class="nav-icon icon-dark" alt="Авторы">
                    <span class="nav-label">Авторы</span>
                </a>
            </nav>
        </div>
        <div class="sidebar-bottom">
            <button id="theme-toggle" class="theme-btn">
                <img src="img/sun.png" class="theme-icon icon-light" alt="Светлая тема">
                <img src="img/sparkles.png" class="theme-icon icon-dark" alt="Тёмная тема">
            </button>
        </div>
    </aside>

    <header class="top-bar">
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Поиск моделей...">
        </div>
        <div class="user-menu">
            <button id="theme-toggle-mobile" class="theme-btn-mobile">
                <img src="img/sun.png" class="theme-icon icon-light" alt="Светлая тема">
                <img src="img/sparkles.png" class="theme-icon icon-dark" alt="Тёмная тема">
            </button>
            <button class="avatar-btn" id="avatar-toggle">
                <div class="avatar-circle">К</div>
            </button>
            <div class="dropdown-menu" id="user-dropdown">
                <div class="dropdown-header">
                    <div class="dropdown-avatar">К</div>
                </div>
                <div class="dropdown-divider"></div>
                <a href="calculator.html" class="dropdown-item">
                    <span>Калькулятор</span>
                </a>
                <a href="guide.html" class="dropdown-item">
                    <span>Помощь</span>
                </a>
                <button class="dropdown-item logout-btn" onclick="handleLogout()">
                    <span>Выход</span>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="calculator-container">
            <h1 class="calculator-title">Калькулятор стоимости 3D-печати</h1>
            
            <form class="calculator-form" id="calc-form">
                <div class="form-group">
                    <label for="weight">Вес модели (граммы)</label>
                    <input type="number" id="weight" min="1" max="10000" value="50" required>
                </div>
                
                <div class="form-group">
                    <label for="material">Материал</label>
                    <select id="material" required>
                        <option value="PLA">PLA (0.02₽/г)</option>
                        <option value="PETG">PETG (0.03₽/г)</option>
                        <option value="ABS">ABS (0.025₽/г)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="infill">Плотность заполнения: <span id="infill-value">20</span>%</label>
                    <input type="range" id="infill" min="10" max="100" value="20" step="5">
                </div>
                
                <button type="submit" class="calc-btn">Рассчитать</button>
            </form>
            
            <div id="calc-result" class="calc-result" style="display: none;">
                <h2>Результат расчета</h2>
                <div class="result-grid">
                    <div class="result-item">
                        <div class="result-label">Стоимость филамента</div>
                        <div class="result-value" id="result-material">0₽</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Время печати</div>
                        <div class="result-value" id="result-time">0 мин</div>
                    </div>
                    <div class="result-item total">
                        <div class="result-label">Итого</div>
                        <div class="result-value" id="result-total">0₽</div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="js/main.js" defer></script>
</body>
</html>
